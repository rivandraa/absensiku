/* =========================================================================================================
    BAGIAN KODE TANGGAL
    Fungsi: Menampilkan tanggal dan waktu real-time pada halaman login dan absensi
    Detail:
    - Menampilkan tanggal lengkap dalam bahasa Indonesia (hari, tanggal, bulan, tahun)
    - Menampilkan waktu dengan format 2-digit (jam, menit, detik)
    - Update dilakukan setiap 1 detik agar tampilannya selalu real-time
    - Langsung tampil saat halaman dimuat tanpa menunggu interval pertama
========================================================================================================= */
// ==============================
// Update Tanggal & Waktu Real-Time
// ==============================
function updateTanggalWaktu() {
    const now = new Date(); // Ambil tanggal dan waktu saat ini

    // Format tanggal dalam bahasa Indonesia, lengkap dengan hari, tanggal, bulan, tahun
    const tanggal = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    // Format waktu dalam bahasa Indonesia, format 2-digit untuk jam, menit, dan detik
    const waktu = now.toLocaleTimeString('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });

    // Gabungkan tanggal dan waktu
    const teks = `${tanggal} | ${waktu}`;

    // Tampilkan tanggal dan waktu di elemen login dan absensi
    document.getElementById('tanggalWaktuLogin').textContent = teks;
    document.getElementById('tanggalWaktuAbsen').textContent = teks;
}

// Jalankan fungsi setiap 1 detik untuk update real-time
setInterval(updateTanggalWaktu, 1000);

// Jalankan langsung sekali saat halaman dimuat

/* =========================================================================================================
    BAGIAN KODE POPUP / NOTIFIKASI
    Fungsi Utama:
    - Menampilkan notifikasi berupa popup pada halaman (success, error, info, loading)

    Catatan Penting:
    - Popup mengambil elemen dengan id="popupNotif"
    - Mendukung auto-close, manual close, callback, dan mode loading
========================================================================================================= */
// ================================
// Popup Notifikasi
// ================================
/**
 * Menampilkan popup/notifikasi
 * @param {string} msg - Pesan yang ingin ditampilkan
 * @param {string} type - Tipe popup: "success", "error", "info", "loading"
 * @param {number|boolean|null} duration 
 *      - ms → auto-close
 *      - false → jangan auto-close
 *      - null → durasi default 2500 ms
 * @param {function|null} callback - Fungsi yang dijalankan setelah popup tertutup
 */
// ================================
// Popup Notifikasi dan Getar
// ================================
let popupActive = false;

/**
 * Menampilkan popup utama (#popupNotif)
 */
function showPopup(msg, type = "success", duration = null, callback = null) {
    const popup = document.getElementById("popupNotif");

    // Bersihkan timeout lama
    if (popup._timeout) {
        clearTimeout(popup._timeout);
        popup._timeout = null;
    }

    // Reset class
    popup.className = "";
    popup.classList.add(type, "show");
    popup.style.display = "block"; // pakai CSS asli Anda
    popupActive = true;

    // Konten popup
    if (type === "loading") {
        popup.innerHTML = '<div class="spinner"></div><div style="margin-top:8px;">' + msg + '</div>';
        return; // loading tidak auto-close
    } else {
        popup.innerHTML = msg;
    }

    // Jika duration = false → jangan auto-close
    if (duration === false) return;

    // Default duration
    if (duration === null) duration = 3000;

    // Auto-close popup
    popup._timeout = setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => {
            popup.style.display = "none";
            popupActive = false;
            if (callback) callback();
        }, 400); // sesuai transition CSS asli
    }, duration);
}

/**
 * Popup sementara / warning saat loading aktif
 */
function showTempPopup(msg, type = "warning", duration = 1000) {
    const temp = document.createElement("div");
    temp.className = "popup-temp " + type;
    temp.innerHTML = msg;

    document.body.appendChild(temp);

    requestAnimationFrame(() => temp.classList.add("show"));

    setTimeout(() => {
        temp.classList.remove("show");
        setTimeout(() => temp.remove(), 400);
    }, duration);
}

/**
 * Menutup popup utama (#popupNotif) secara paksa
 */
function forceClosePopup() {
    const popup = document.getElementById("popupNotif");

    if (popup._timeout) {
        clearTimeout(popup._timeout);
        popup._timeout = null;
    }

    popup.classList.remove("show");
    setTimeout(() => {
        popup.style.display = "none";
        popupActive = false;
    }, 400);
}

/**
 * Fungsi Getar Pendek (warning / error)
 */
function vibrateAlertShort() { 
    if (navigator.vibrate) {
        navigator.vibrate([80, 50, 80]);  // total ≈ 210ms
    }
}

/**
 * Fungsi Getar Panjang (sukses)
 */
function vibrateAlertLong() {

        navigator.vibrate([300, 100, 300, 100, 300]);  // total ≈ 800ms

}

/* =========================================================================================================

    - Proses login user: verifikasi username/password, simpan session, tampilkan halaman absensi
    - Error handling: menampilkan popup atau alert jika login gagal atau server error

    Catatan Penting:
    - Password di-hash menggunakan SHA-256 sebelum dikirim ke server

/* =========================================================================================================
    BAGIAN KODE LOGIN
    Fungsi: Menangani update tanggal/waktu real-time, login user, dan error handling
========================================================================================================= */
// ================================
// Hashing Password
// ================================
/**
 * Meng-hash password menggunakan SHA-256 dan mengembalikannya dalam format Base64
 */
async function hashPassword(password) {
    try {
        const msgUint8 = new TextEncoder().encode(password); // Konversi password menjadi Uint8Array
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8); // Hash SHA-256
        const hashArray = Array.from(new Uint8Array(hashBuffer)); // Konversi buffer ke array
        const hashBase64 = btoa(String.fromCharCode.apply(null, hashArray)); // Encode Base64
        return hashBase64;
    } catch (e) {
        console.error("Hashing Error:", e);
        showPopup("⚠️ Gagal memproses password. Cek konsol browser.", "error", 3000);
        return ""; // Mengembalikan string kosong jika gagal
    }
}

// LOGIN

/**
 * Proses login user
 */
// Deklarasikan URL Web App GAS Anda di bagian paling atas skrip
const GAS_URL = "https://script.google.com/macros/s/AKfycbxeeLLoLcCb194b3JJuJBX-2detUx02NTRn7s_3_FSKu4v1RyuRVD1dnuEIzcg9RGgB/exec";

async function loginUser() {
    hideAlerts(); 

    const username = $('#username').val().trim();
    const password = $('#password').val().trim();

    if (!username || !password) {
        showPopup("Username dan Password harus diisi!", "error");
        return;
    }

    showPopup("Memproses login...", "loading");

    const passwordHash = await hashPassword(password);

    // Pengganti google.script.run
    try {
        const response = await fetch(GAS_URL, {
            method: "POST", // Menggunakan POST agar aman mengirim hash
            mode: "no-cors", // Penting untuk menghindari blokir CORS di GAS
            body: JSON.stringify({
                action: "checkLogin",
                username: username,
                passwordHash: passwordHash
            })
        });

        /* CATATAN: Karena GAS menggunakan redirect, fetch dengan mode 'no-cors' 
           tidak bisa membaca body response secara langsung. 
           Solusi terbaik: Gunakan 'cors' (default) tapi pastikan GAS mengembalikan JSON yang benar.
        */

        // VERSI LEBIH STABIL UNTUK GITHUB PAGES:
        const webResponse = await fetch(`${GAS_URL}?action=checkLogin&username=${username}&passwordHash=${passwordHash}`);
        const res = await webResponse.json();

        if (res && res.status !== "error") {
            // ✅ Login berhasil
            userData = res;

            sessionStorage.setItem('userData', JSON.stringify(res));
            sessionStorage.setItem('page', 'absen');

            $('#LoginPage').hide();
            $('#AbsensiPage').show();

            $('#perangkatDisplay').val(res.nama + ' | ' + res.jabatan);
            $('#perangkatData').val(res.nama + '|' + res.jabatan);

            fotoData = null;

            if (res.koordinat) {
                const parts = res.koordinat.split(",");
                targetLocation = {
                    lat: parseFloat(parts[0]),
                    lon: parseFloat(parts[1])
                };
                lastTargetLocation = targetLocation;
            } else {
                targetLocation = null;
                lastTargetLocation = null;
            }
            
            showPopup("Login berhasil! Selamat datang " + res.nama, "success");

            startIdleTimer();
            startGPS();
            startWebcam();
            
        } else {
            // Username/password salah atau error dari server
            const errMsg = res.message || "Username atau Password salah!";
            $('#alertLogin').html("⚠️ " + errMsg).show();
            showPopup(errMsg, "error");
        }
    } catch (error) {
        console.error("Connection Error:", error);
        showPopup("⚠️ Gagal terhubung ke server. Pastikan koneksi internet stabil.", "error", 5000);
    }
}

function isWebView() {
    return typeof GPSBridge !== "undefined";
}

// =====================================================
// GET GPS ENABLE STATUS (Universal)
// =====================================================
async function isGPSEnabledUniversal() {
    if (isWebView()) {
        try { return GPSBridge.isGPSEnabled(); } catch { return true; }
    }
    try {
        const perm = await navigator.permissions.query({ name: "geolocation" });
        return perm.state !== "denied";
    } catch { return true; }
}

// =====================================================
// START & STOP GPS
// =====================================================
function startGPS() {
    gpsSystemActive = true;
    refreshTargetLocation(() => {
        if (!gpsSystemActive) return;
        startGPSMonitoring();
    });
}

function stopGPSMonitoring() {
    gpsSystemActive = false;
    resetGPSState();
    forceClosePopup();
}

function resetGPSState() {
    [gpsMonitorInterval, gpsLoadingInterval, gpsImproveInterval, accAnim].forEach(int => {
        if (int !== null) clearInterval(int);
    });
    gpsMonitorInterval = gpsLoadingInterval = gpsImproveInterval = accAnim = null;

    if (accuracyCycleTimer !== null) {
        clearTimeout(accuracyCycleTimer);
        accuracyCycleTimer = null;
    }

    if (gpsWatcherId !== null) {
        navigator.geolocation.clearWatch(gpsWatcherId);
        gpsWatcherId = null;
    }

    accDots = 0;
    areaErrorActive = false;
    lastInsideArea = null;
    gpsData = [0, 0];
    gpsErrorActive = false;
    animatingGPS = false;
    improvingAccuracy = false;
    wasGPSEnabled = null;
    lastGPSEnabled = null;
    targetLocation = null;
    lastTargetLocation = null;
    isFetchingLocation = false;

    //updateGPSDisplay("Silakan tunggu...");
}

function forceUpdateDistanceUI(lat, lon, acc) {

    const status = statusInput ? statusInput.value : "";
    const elNama = document.getElementById("titikKoordinatTampil");
    const namaLokasi = (elNama && elNama.value) ? elNama.value : "Area Absensi";

    // Gunakan koordinat dari parameter atau dari memory
    const currentLat = lat || gpsData[0];
    const currentLon = lon || gpsData[1];

    if (currentLat === 0) return;

    let displayText = "Lokasi Anda : " + currentLat.toFixed(6) + "," + currentLon.toFixed(6) + "\n";
    
    // Jika akurasi masih buruk (saat animasi)
    if (acc && acc > 30) {
        displayText += "Tingkat Akurasi : " + acc.toFixed(0) + " Meter | > 30 Meter\n" +
                       "Sedang meningkatkan akurasi" + ".".repeat(accDots);

        displayText += "Tingkat Akurasi : " + acc.toFixed(0) + " Meter | > 30 Meter\n";
    }

    if ((status === "Hadir" || status === "WFH") && targetLocation) {
            const distance = getDistanceFromLatLonInMeters(currentLat, currentLon, targetLocation.lat, targetLocation.lon);
            const insideArea = distance <= RADIUS_LIMIT;
            
            // Update global state secara instan
            lastInsideArea = insideArea;
    
            // Langsung tampilkan status area berdasarkan hasil hitung jarak
            displayText += insideArea
                ? `\n✅ Berada dalam area/radius ${namaLokasi}`
                : `\n❌ Di luar area dari Titik Koordinat Absensi\n📏 Jarak ${distance.toFixed(0)} Meter (Max. ${RADIUS_LIMIT} Meter)`;
        }

    updateGPSDisplay(displayText);

    // Kunci tombol kamera secara instan jika ada
    const btnKamera = document.getElementById("btnKamera");
    if (btnKamera) {
        if ((status === "Hadir" || status === "WFH")) {
            btnKamera.disabled = !lastInsideArea;
            btnKamera.style.opacity = lastInsideArea ? "1" : "0.5";
        } else {
            btnKamera.disabled = false;
            btnKamera.style.opacity = "1";
        }
    }
}

// =====================================================
// REFRESH TARGET LOCATION
// =====================================================
let isFetchingLocation = false;

async function refreshTargetLocation(callback) {
    const userRequesting = (userData && userData.username) ? userData.username : null;
    if (!userRequesting) {
        if (typeof callback === "function") callback();
        return;
    }

    const statusInput = document.getElementById("status");
    const currentStatus = statusInput ? statusInput.value : "";
    const tampil = document.getElementById("titikKoordinatTampil");
    const hidden = document.getElementById("titikKoordinat");

    // 1. Jika Status Khusus, Langsung Eksekusi & Berhenti
    if (["Dinas", "Izin", "Sakit"].includes(currentStatus)) {
        targetLocation = null;
        lastTargetLocation = null;
        if (tampil) tampil.value = "-";
        if (hidden) hidden.value = "-";
        if (typeof forceUpdateDistanceUI === "function") forceUpdateDistanceUI();
        if (typeof callback === "function") callback();
        return; 
    }

    if (!currentStatus || currentStatus === "Pilih Status...") {
        if (tampil) tampil.value = "⚠️ Pilih Status";
        targetLocation = null;
        if (typeof callback === "function") callback();
        return;
    }

    // 2. Cegah Double Request tapi tetap izinkan proses
    if (isFetchingLocation) return;

    try {
        isFetchingLocation = true;
        const url = `${GAS_URL}?action=getTargetLocation&username=${encodeURIComponent(userRequesting)}&status=${encodeURIComponent(currentStatus)}`;
        const response = await fetch(url);
        const loc = await response.json();

        // --- KUNCI ANTI LAMBAT & ANTI KEDIP ---
        // Cek lagi status saat ini. Jika user sudah pindah ke Dinas/Izin/Sakit
        // saat data ini baru datang, maka JANGAN update UI.
        const latestStatus = document.getElementById("status")?.value;
        if (["Dinas", "Izin", "Sakit"].includes(latestStatus)) {
            isFetchingLocation = false; // Reset flag
            return; 
        }

        if (loc && loc.lat && loc.lon) {
            const newLocation = { lat: parseFloat(loc.lat), lon: parseFloat(loc.lon) };
            targetLocation = newLocation;
            lastTargetLocation = newLocation;

            const koordinatMurni = `${newLocation.lat.toFixed(6)}, ${newLocation.lon.toFixed(6)}`;
            if (tampil) tampil.value = (loc.nama && loc.nama.trim() !== "") ? loc.nama : koordinatMurni;
            if (hidden) hidden.value = koordinatMurni;

            if (gpsData[0] !== 0) forceUpdateDistanceUI();
        } else {
            targetLocation = null;
            if (tampil) tampil.value = "Titik tidak ditemukan";
        }
    } catch (error) {
        console.error("Gagal mengambil lokasi:", error);
    } finally {
        isFetchingLocation = false;
        if (typeof callback === "function") callback();
    }
}
    
// =====================================================
// CALCULATION LOGIC
// =====================================================
function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = deg => deg * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// =====================================================
// MONITORING & WATCHER
// =====================================================
function startGPSMonitoring() {
    const gpsDiv = document.getElementById("gps");
    if (!gpsDiv) return;

    gpsData = [0, 0];
    lastInsideArea = null;
    areaErrorActive = false;
    updateGPSDisplay("Sedang mencari lokasi");
    startGPSLoading();

    if (!navigator.geolocation) {
        stopGPSLoading();
        updateGPSDisplay("⚠️ GPS tidak tersedia");
        return;
    }

    async function handleGPS() {
        const gpsEnabled = await isGPSEnabledUniversal();
        if (gpsEnabled === lastGPSEnabled) return;
        lastGPSEnabled = gpsEnabled;

        if (!gpsEnabled) {
            if (gpsWatcherId !== null) navigator.geolocation.clearWatch(gpsWatcherId);
            gpsWatcherId = null;
            stopGPSLoading();
            if (accAnim) { clearInterval(accAnim); accAnim = null; }
            gpsData = [0, 0];
            updateGPSDisplay("⚠️ GPS tidak aktif atau sinyal hilang.");
            if (!gpsErrorActive) {
                gpsErrorActive = true;
                showPopup("⚠️ Periksa GPS Anda.", "error", false);
            }
            return;
        }

        if (!wasGPSEnabled) {
            wasGPSEnabled = true;
            gpsErrorActive = false;
            forceClosePopup();
            startGPSLoading();
            setTimeout(() => startWatch(), 1000);
        }
    }

    function startWatch() {
        if (!gpsSystemActive) return;
        if (gpsWatcherId !== null) navigator.geolocation.clearWatch(gpsWatcherId);

        gpsWatcherId = navigator.geolocation.watchPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const acc = pos.coords.accuracy;
                stopGPSLoading();

                if (acc > 30) {
                    gpsData = [lat, lon];
                    startAccAnim(lat, lon, acc);
                } else {
                    stopAccAnim();
                    gpsData = [lat, lon];
                    // INSTAN: Update UI segera saat koordinat masuk
                    forceUpdateDistanceUI(lat, lon, acc);
                }

                if (gpsErrorActive) {
                    forceClosePopup();
                    gpsErrorActive = false;
                }
            },
            err => {
                stopAccAnim();
                gpsData = [0, 0];
                stopGPSLoading();
                updateGPSDisplay("⚠️ Sinyal GPS hilang.");
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 }
        );
    }

    function startAccAnim(lat, lon, acc) {
        stopAccAnim();
        animatingGPS = true;
        accAnim = setInterval(() => {
            accDots = (accDots + 1) % 4;
            forceUpdateDistanceUI(lat, lon, acc);
        }, 500);
    }

    function stopAccAnim() {
        if (accAnim) clearInterval(accAnim);
        accAnim = null;
        accDots = 0;
        animatingGPS = false;
    }

    setTimeout(() => handleGPS(), 400);
    if (!gpsMonitorInterval) {
        gpsMonitorInterval = setInterval(() => {
            if (!gpsSystemActive) return; // cek setiap 5 detik
            handleGPS();
            refreshTargetLocation();
        }, 5000);
    }
}

let stream = null; 
let gpsSaatFoto = [0, 0];
let fotoData = null;
let isStarting = false; 

function stopWebcam() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }
  const video = document.getElementById('video');
  if (video) {
    video.pause();
    video.srcObject = null;
    video.load();
    video.style.display = "none";
  }
}

async function startWebcam() {
  if (isStarting) return;
  isStarting = true;

  const video = document.getElementById('video');
  const preview = document.getElementById('fotoPreview');
  const container = document.getElementById('cameraContainer');
  const btn = document.getElementById('restartCamera');

  if (btn) btn.disabled = true;

  try {
    resetFoto();
    stopWebcam();
    preview.style.display = 'none';
    video.style.display = 'none';

    await new Promise(resolve => setTimeout(resolve, 500));

    const devices = await navigator.mediaDevices.enumerateDevices();
    const hasCamera = devices.some(d => d.kind === 'videoinput');
    if (!hasCamera) {
      showPopup("📷 Tidak ada kamera terdeteksi.", "error");
      return;
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });

    video.srcObject = stream;
    await new Promise((resolve, reject) => {
      video.onloadedmetadata = () => {
        video.play().then(resolve).catch(reject);
      };
    });

    video.style.display = 'block';
    const aspect = video.videoHeight / video.videoWidth;
    if (aspect && isFinite(aspect)) {
      container.style.height = `${container.offsetWidth * aspect}px`;
    }
  } catch (err) {
    console.error("Kamera Error:", err);
    showPopup("❌ Gagal akses kamera: " + err.message, "error");
    stopWebcam();
  } finally {
    isStarting = false;
    if (btn) btn.disabled = false;
  }
}

    this.disabled = false;

});

  }

    vibrateAlertShort();
    ketField.focus();
    ketField.scrollIntoView({ behavior: "smooth", block: "center" });
    isSnapping = false;
    return;
  }
 
   // VALIDASI FOTO
  if (fotoData) {
    showPopup("⚠️ Tekan tombol Reset dahulu.", "warning");
    vibrateAlertShort();
    isSnapping = false;
    return;
  }

  // VALIDASI KAMERA
  if (!stream) {
    showPopup("️ Kamera tidak tersedia / tidak diizinkan!", "error");
    vibrateAlertShort();
    isSnapping = false;
    return;
  }

  //  VALIDASI GPS & RADIUS
  if ((gpsData[0] === 0 && gpsData[1] === 0) || animatingGPS || improvingAccuracy) {
    showPopup("⚠️ GPS tidak aktif atau GPS sedang mencari lokasi / meningkatkan akurasi.", "warning");
    vibrateAlertShort();
    isSnapping = false;
    return;
  }

  if (status === "Hadir" || status === "WFH") {
    if (koordinatValue === "Sedang mengambil data...") {
        showPopup("⚠️ Menunggu koordinat absensi...", "warning");
		vibrateAlertShort();
		isSnapping = false;
        return;
    }
    
    // Mengganti checkUserLocation dengan logika getDistanceFromLatLonInMeters
    if (targetLocation) {
        const distance = getDistanceFromLatLonInMeters(gpsData[0], gpsData[1], targetLocation.lat, targetLocation.lon);
        if (distance > RADIUS_LIMIT) {
            showPopup(`❌ Di luar area! Jarak: ${distance.toFixed(0)}m`, "error");
			vibrateAlertShort();
			isSnapping = false;
            return;
        }
    }
  }

  // 3. PROSES PENGAMBILAN GAMBAR
  showPopup("Mengambil foto...", "loading");
  
    try {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        
        // 1. Ambil gambar murni dari video
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const fotoMurni = canvas.toDataURL("image/jpeg", 0.85);
    
        // 2. Sinkronisasi Waktu Server (Tetap pakai fetch sesuai kode Anda)
        const response = await fetch(`${GAS_URL}?action=getServerTime`);
        const serverTime = await response.json();
    
        // Persiapan Variabel untuk Watermark
        const labelStatus = document.getElementById("status") ? document.getElementById("status").value : "";
        const finalKeterangan = ""; // Kosongkan jika tidak ada input keterangan
        const jamTampil = serverTime.waktu + " WITA";
        const tanggalServer = serverTime.tanggal;
        const hariServer = serverTime.hari;
        const gpsText = `${gpsData[0]}, ${gpsData[1]}`;
        const gpsSaatFoto = [...gpsData];
    
        const img = new Image();
        img.onload = function () {
            const ctx2 = canvas.getContext("2d");
            ctx2.drawImage(img, 0, 0, canvas.width, canvas.height);
    
            // ==========================================
            // LOGIKA WATERMARK (SAMA PERSIS 100%)
            // ==========================================
            const marginBottom = 20;
            const startX = 30;
            const paddingRight = 30;
            const paddingBox = 40;
            const lineHeight = 28;
    
            ctx2.textAlign = "left";
    
            // Shadow halus
            ctx2.shadowColor = "rgba(0,0,0,0.6)";
            ctx2.shadowBlur = 3;
            ctx2.shadowOffsetX = 1;
            ctx2.shadowOffsetY = 1;
    
            // WRAP FUNCTION
            function getWrappedLines(ctx, text, maxWidth) {
                const words = text.split(" ");
                let lines = [];
                let line = "";
                for (let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + " ";
                    if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                        lines.push(line.trim());
                        line = words[n] + " ";
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line.trim());
                return lines;
            }
    
            const maxWidthText = canvas.width - startX - paddingRight;
            ctx2.font = "20px Arial";
            const ketLines = finalKeterangan ? getWrappedLines(ctx2, finalKeterangan, maxWidthText) : [];
    
            // HITUNG JUMLAH BARIS
            let totalLines = 0;
            if (labelStatus) totalLines += 1;
            totalLines += 3; // JAM, TANGGAL, GPS
            totalLines += ketLines.length;
    
            const totalHeight = (totalLines - 0.3) * lineHeight;
            let currentY = canvas.height - marginBottom;
    
            // HITUNG LEBAR TERPANJANG
            function getMaxTextWidth(ctx, texts) {
                let max = 0;
                texts.forEach(t => {
                    const w = ctx.measureText(t).width;
                    if (w > max) max = w;
                });
                return max;
            }
    
            let allLines = [];
            if (labelStatus) { ctx2.font = "bold 24px Arial"; allLines.push(labelStatus); }
            ctx2.font = "bold 23px Arial"; allLines.push(jamTampil);
            ctx2.font = "22px Arial"; allLines.push(`${tanggalServer} | ${hariServer}`);
            ctx2.font = "20px Arial"; allLines.push(gpsText);
            if (ketLines.length > 0) allLines = allLines.concat(ketLines);
    
            const maxTextWidth = getMaxTextWidth(ctx2, allLines);
            const dynamicWidth = maxTextWidth + paddingBox;
            const finalBoxWidth = Math.min(dynamicWidth, canvas.width);
    
            // BACKGROUND DINAMIS
            const padding = 15;
            const boxTop = currentY - totalHeight - padding;
            const boxBottom = currentY + padding;
            const boxHeight = totalHeight + padding * 2;
    
            const gradient = ctx2.createLinearGradient(0, 0, finalBoxWidth, 0);
            gradient.addColorStop(0, "rgba(0,0,0,0.35)");
            gradient.addColorStop(1, "rgba(0,0,0,0)");
    
            ctx2.fillStyle = gradient;
            ctx2.fillRect(0, boxTop, finalBoxWidth, boxHeight);
    
            // GARIS KUNING FIX
            ctx2.shadowColor = "transparent";
            ctx2.strokeStyle = "#FFC107";
            ctx2.lineWidth = 4;
            ctx2.lineCap = "round";
            const halfStroke = ctx2.lineWidth / 2;
    
            ctx2.beginPath();
            ctx2.moveTo(startX - 12, boxTop + halfStroke);
            ctx2.lineTo(startX - 12, boxBottom - halfStroke);
            ctx2.stroke();
    
            // GAMBAR TEKS DARI BAWAH NAIK
            if (ketLines.length > 0) {
                ctx2.font = "20px Arial"; ctx2.fillStyle = "#FFFFFF";
                for (let i = ketLines.length - 1; i >= 0; i--) {
                    ctx2.fillText(ketLines[i], startX, currentY);
                    currentY -= lineHeight;
                }
            }
    
            ctx2.font = "20px Arial"; ctx2.fillStyle = "#F8F9FA";
            ctx2.fillText(gpsText, startX, currentY);
            currentY -= lineHeight;
    
            ctx2.font = "22px Arial"; ctx2.fillStyle = "#FFFFFF";
            ctx2.fillText(`${tanggalServer} | ${hariServer}`, startX, currentY);
            currentY -= lineHeight;
    
            ctx2.font = "bold 23px Arial";
            ctx2.fillText(jamTampil, startX, currentY);
            currentY -= lineHeight;
    
            if (labelStatus) {
                ctx2.font = "bold 24px Arial"; ctx2.fillStyle = "#FFC107";
                ctx2.fillText(labelStatus, startX, currentY);
            }
    
            // Reset shadow
            ctx2.shadowColor = "transparent";
            ctx2.shadowBlur = 0;
    
            // FINALISASI FOTO
            const finalFoto = canvas.toDataURL("image/jpeg", 0.90);
            fotoData = {
                name: `${userData?.nama || "user"}_${serverTime.full.replace(/[: ]/g, "_")}.jpeg`,
                base64: finalFoto.split(",")[1],
                gps: gpsSaatFoto,
                waktu: serverTime.iso
            };
    
            const fotoPreview = document.getElementById("fotoPreview");
            fotoPreview.src = finalFoto;
            fotoPreview.style.display = "block";
            video.style.display = "none";
    
            showPopup("Foto berhasil diambil ✅", "success", 1000);
            isSnapping = false;
        };
        img.src = fotoMurni;
    
    } catch (err) {
        console.error(err);
        showPopup("❌ Gagal memproses foto/waktu!", "error");
        isSnapping = false;
    }
});

    SUBMIT FORM ABSENSI
===================================================== */
/*
    Fungsi submitAbsensiForm:
    - Validasi session login
    - Validasi input status kehadiran
    - Validasi foto untuk status Hadir/Dinas
    - Validasi GPS sudah aktif
    - Mengirim data absensi ke Google Apps Script
    - Menampilkan popup notifikasi berdasarkan hasil response
*/
// ================================
// Submit Absensi
// ================================
/**
 * Submit form absensi
 */
// ================================
// Submit Absensi
// ================================
let isSubmitting = false;

async function submitAbsensiForm() {
    if (typeof hideAlerts === "function") hideAlerts();

    // 🚫 Cegah double submit
    if (isSubmitting) {
        showTempPopup("⏳ Absensi sedang diproses, harap tunggu...", "warning");
        vibrateAlertShort();
        return;
    }
    isSubmitting = true;

    const perangkatVal = $('#perangkatData').val() ? $('#perangkatData').val().trim() : "";
    const val = perangkatVal ? perangkatVal.split('|') : [];

    // Validasi Sesi
    if (!userData || val.length < 2 || !val[0] || !val[1]) {
        showPopup("Sesi login berakhir. Silakan login ulang.", "error");
        isSubmitting = false;
        return;
    }

    const statusRaw = $('#status').val().trim(); 
    const status = statusRaw.toLowerCase();
    const keterangan = $('#keterangan').val().trim();

    // Validasi Status
    if (!statusRaw) {
        showPopup("Silakan pilih status terlebih dahulu!", "warning");
        vibrateAlertShort();
        document.getElementById('status').focus();
        isSubmitting = false;
        return;
    }

    // Validasi Keterangan (Izin/Sakit/Dinas)
    const ketWajib = ["izin", "sakit", "dinas"].includes(status);
    if (ketWajib && !keterangan) {
        showPopup("Keterangan wajib diisi untuk status " + statusRaw + "!", "warning");
        vibrateAlertShort();
        const ketField = document.getElementById('keterangan');
        ketField.focus();
        isSubmitting = false;
        return;
    }

    // Validasi Foto (Hadir/Dinas)
    const wajibFoto = ["hadir", "dinas", "WFH"].includes(status);
    if (wajibFoto && !fotoData) {
        showPopup("Foto Kehadiran wajib untuk status " + statusRaw + "!", "warning");
        vibrateAlertShort();
        isSubmitting = false;
        return;
    }

    // Validasi GPS (Kecuali Izin/Sakit)
    const gpsWajib = !["izin", "sakit"].includes(status);
    if (gpsWajib) {
        if ((gpsData[0] === 0 && gpsData[1] === 0) || (typeof animatingGPS !== 'undefined' && animatingGPS)) {
            showPopup("GPS belum aktif atau sedang akurasi. Izinkan akses lokasi.", "error");
            vibrateAlertShort();
            isSubmitting = false;
            return;
        }
    }

    // Validasi Radius (Khusus Hadir)
    if (status === "hadir"|| status === "WFH") {
        const [lat, lon] = gpsData;
        const insideArea = checkUserLocation(lat, lon, statusRaw);
        if (!insideArea) {
            showPopup("⚠️ Anda berada di luar area absensi!", "error");
            vibrateAlertShort();
            isSubmitting = false;
            return;
        }
    }

    // ======================================
    // PERSIAPAN DATA UNTUK DIKIRIM
    // ======================================
    const payload = {
        action: "submitAbsensi", // Memberitahu GAS action apa yang dijalankan
        nama: val[0],
        jabatan: val[1],
        status: statusRaw,
        keterangan: keterangan,
        statusPegawai: userData.statusPegawai,
        spreadsheetId: userData.spreadsheetId,
        folderId: userData.folderId
    };

    if (!["izin", "sakit"].includes(status)) {
        payload.foto = fotoData; // Ini berisi {base64, name, type, dll}
        payload.gps = gpsSaatFoto;
    }

    // Kunci UI
    document.getElementById('snap').disabled = true;
    document.getElementById('reset').disabled = true;
    showPopup("Memproses absensi...", "loading");

    try {
        // 🔥 KIRIM DATA KE GAS MENGGUNAKAN FETCH (POST)
        const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const res = await response.json();

        // Buka Kunci UI
        document.getElementById('snap').disabled = false;
        document.getElementById('reset').disabled = false;
        isSubmitting = false;

        if (res.status === "berhasil") {
            const waktuID = formatIndonesia(res.waktu);
            showPopup(
                `✅ Absensi berhasil!<br>Nama: <b>${res.nama}</b><br>Waktu: <b>${waktuID}</b>`,
                "success", 6000
            );
            vibrateAlertLong();
            
            // Reset Form
            $('#status').val('');
            $('#keterangan').val('');
            fotoData = null;
            resetFoto();

        } else if (res.status === "sudah_absen") {
            const waktuID = formatIndonesia(res.waktu);
            showPopup(`⚠️ Anda sudah absen hari ini!<br>Waktu: <b>${waktuID}</b>`, "warning", 6000);
            vibrateAlertLong();
        } else {
            throw new Error(res.message || "Gagal menyimpan");
        }

    } catch (err) {
        document.getElementById('snap').disabled = false;
        document.getElementById('reset').disabled = false;
        isSubmitting = false;
        showPopup("⚠️ Gagal mengirim: " + err.message, "error");
        vibrateAlertLong();
    }
}

// =========================================================================================================
// FUNGSI PEMBANTU: FORMAT TANGGAL & WAKTU (INDONESIA)
// =========================================================================================================
function formatIndonesia(waktuString) {
    const d = new Date(waktuString);
    if (isNaN(d)) return waktuString; // Jika bukan format tanggal, kembalikan teks aslinya

    const tgl = String(d.getDate()).padStart(2, "0");
    const bln = String(d.getMonth() + 1).padStart(2, "0"); // Bulan dimulai dari 0
    const thn = d.getFullYear();
    
    const jam = String(d.getHours()).padStart(2, "0");
    const menit = String(d.getMinutes()).padStart(2, "0");
    const detik = String(d.getSeconds()).padStart(2, "0");

    return `${tgl}-${bln}-${thn} | ${jam}:${menit}:${detik} WITA`;
}

/**

 */
async function loadLaporan_Absensi() {
    const tbody = $("#InnerPage").find("#Laporan-Absensi-Table tbody");
    const thead = $("#InnerPage").find("#Laporan-Absensi-Table thead");
    
    tbody.html('<tr><td colspan="8">Sedang mengambil data...</td></tr>');

    const spreadsheetId = userData && userData.spreadsheetId ? userData.spreadsheetId : null;

    if (!spreadsheetId) {
        showPopup("Sesi berakhir, silakan login ulang", "error");
        tbody.html('<tr><td colspan="8">User belum login.</td></tr>');
        return;
    }

    try {
        // 🔥 Ganti google.script.run menjadi fetch GET
        const response = await fetch(`${GAS_URL}?action=getLaporan_Absensi&spreadsheetId=${spreadsheetId}`);
        const res = await response.json();

        if (res) {
            showPopup("Data berhasil dimuat", "success", 1000);
            
            // 1. Render Kop
            $("#kopLaporan").text(res.kop || "LAPORAN ABSENSI");

            // 2. Render Header
            let theadHtml = "<tr>";
            res.header.forEach(h => {
                theadHtml += `<th class="align-middle">${h}</th>`;
            });
            theadHtml += "</tr>";
            thead.html(theadHtml);

            // 3. Render Baris Data
            let tbodyHtml = "";
            if (res.rows && res.rows.length > 0) {
                res.rows.forEach(r => {
                    tbodyHtml += `
                        <tr>
                            <td>${r.no}</td>
                            <td class="text-start">${r.nama}</td>
                            <td class="text-start">${r.jabatan}</td>
                            <td class="fw-bold text-success">${r.hadir}</td>
                            <td class="text-warning">${r.izin}</td>
                            <td class="text-danger">${r.sakit}</td>
                            <td class="text-info">${r.dinas}</td>
                            <td class="bg-light">${r.tanpaKeterangan}</td>
                        </tr>`;
                });
            } else {
                tbodyHtml = '<tr><td colspan="8">Tidak ada data.</td></tr>';
            }
            tbody.html(tbodyHtml);
        }
    } catch (err) {
        showPopup("Gagal mengambil data dari server", "error");
        tbody.html('<tr><td colspan="8">Koneksi bermasalah.</td></tr>');
    }
}

/**
 * Submit Form Ubah Password
 */
async function submitPengaturanPassword() {
    const alertBox = $('#Pengaturan_PasswordAlert');
    alertBox.hide();

    const oldPass = $('#oldPassword').val();
    const newPass = $('#newPassword').val();
    const confirmPass = $('#confirmNewPassword').val();
    const username = $('#Pengaturan_PasswordUsername').val();

    // --- VALIDASI (Sesuai aslinya) ---
    if (!oldPass || !newPass || !confirmPass) {
        alertBox.html("Semua kolom harus diisi.").show();
        return;
    }
    if (newPass.length < 6) { 
        alertBox.html("Password baru minimal 6 karakter.").show();
        return;
    }
    if (newPass !== confirmPass) {
        alertBox.html("Password baru dan konfirmasi tidak cocok.").show();
        return;
    }
    if (oldPass === newPass) {
        alertBox.html("Password baru tidak boleh sama dengan password lama.").show();
        return;
    }

    showPopup("Memverifikasi password...", "loading");

    try {
        // Hash password (Gunakan fungsi hashPassword yang sudah Anda miliki)
        const oldPassHash = await hashPassword(oldPass); 
        const newPassHash = await hashPassword(newPass); 

        const payload = {
            action: "updatePassword",
            username: username,
            oldPassword: oldPassHash,
            newPassword: newPassHash
        };

        // 🔥 Kirim ke GAS via POST
        const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });
        
        const res = await response.json();

        // Reset input form
        $('#oldPassword, #newPassword, #confirmNewPassword').val('');

        if (res.status === "berhasil") {
            showPopup("✅ Password berhasil diubah!", "success", 3000);
            setTimeout(closePengaturanPasswordForm, 2000);
        } else if (res.status === "salah_lama") {
            showPopup("⚠️ Password lama salah!", "error");
            alertBox.html("Password lama yang Anda masukkan salah.").show();
        } else {
            showPopup("⚠️ Gagal mengubah password.", "error");
        }

    } catch (err) {
        showPopup("Terjadi kesalahan koneksi", "error");
        console.error(err);
    }
}

/* =========================================================================================================
    INIT HALAMAN (Inisialisasi Saat Halaman Dimuat)
    Fungsi: Mengecek session, menampilkan halaman sesuai state, memulai GPS, webcam, dan idle timer
========================================================================================================= */
/* =====================================================
    Inisialisasi Halaman Saat Dokumen Siap
===================================================== */
/*
    $(document).ready(function() { ... })
    - Fungsi dijalankan saat DOM siap
    - Mengecek apakah ada session user yang tersimpan
    - Menentukan halaman mana yang ditampilkan:
        1. Laporan_Absensi
        2. Pengaturan_Password
        3. Default: Halaman Absensi
    - Menyertakan restart GPS, webcam, dan idle timer
    - Jika tidak ada session → tampilkan halaman login
*/
/* ===================================================
    INIT (Inisialisasi Saat Halaman Dimuat)
=================================================== */
$(document).ready(function() {
    const savedUser = sessionStorage.getItem('userData');
    const page = sessionStorage.getItem('page');

    if (savedUser) {
        userData = JSON.parse(savedUser);

        // ========= // Cek Halaman Laporan_Absensi ==========
        if (page === 'Laporan_Absensi') {
            $('#LoginPage').hide();
            $('#AbsensiPage').hide();
            showLaporan_Absensi(); // Fungsi ini sudah menghentikan resource (jika ada)
            return;
        } 

        // ========= // Cek Halaman Ubah Password ==========
        else if (page === 'Pengaturan_Password') {
            $('#LoginPage').hide();
            $('#AbsensiPage').hide();
            openPengaturanPasswordForm(); // Fungsi ini sudah menghentikan resource (jika ada)
            return;
        } 

        // ========= // Default Halaman Absensi ==========
        $('#LoginPage').hide(); 
        $('#AbsensiPage').show();
        $('#InnerPage').hide();

        $('#perangkatDisplay').val(userData.nama + ' | ' + userData.jabatan);
        $('#perangkatData').val(userData.nama + '|' + userData.jabatan);

        fotoData = null; // Selalu reset foto saat refresh halaman absensi
        startGPS();
        startWebcam(); 
        startIdleTimer();

    } else { 
        // ========= // Tidak Ada Sesi Tersimpan ==========
        $('#LoginPage').show(); 
        $('#AbsensiPage').hide(); 
        $('#InnerPage').hide(); 
        hideAlerts();
    }
});

// Fungsi autoresize
function autoResize(el) { 
    el.style.height = 'auto'; 
    el.style.height = el.scrollHeight + 'px'; 
}

function autoFitText(selector, maxSize = 22, minSize = 10) {
    const elements = document.querySelectorAll(selector);

    elements.forEach(el => {
        let size = maxSize;
        el.style.fontSize = size + "px";

        while (el.scrollWidth > el.clientWidth && size > minSize) {
            size--;
            el.style.fontSize = size + "px";
        }
    });
}

function runAutoFit() {
    autoFitText(".title", 22, 12);
    autoFitText(".subtitle", 18, 10);
}

window.addEventListener("load", runAutoFit);
window.addEventListener("resize", runAutoFit);
