<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kamera</title>
    <style>
        /* CSS agar tampilan bagus */
        #video { 
            width: 100%; 
            max-width: 500px; 
            transform: scaleX(-1); /* Efek Mirror */
            display: none; 
            border-radius: 10px;
        }
        #fotoPreview { 
            width: 100%; 
            max-width: 500px; 
            display: none; 
            border-radius: 10px;
        }
        .container { text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" autoplay playsinline></video>
        <img id="fotoPreview">
        
        <br>
        <button id="restartCamera" onclick="startWebcam()" class="btn">Buka Kamera</button>
    </div>

    <script>
        /* TEMPELKAN KODE ANDA DI SINI */
        let stream = null;
        let isStarting = false;

        async function startWebcam() {
            if (isStarting) return;
            isStarting = true;

            const video = document.getElementById('video');
            const preview = document.getElementById('fotoPreview');
            const btn = document.getElementById('restartCamera');

            if (btn) btn.disabled = true;

            try {
                if (preview) preview.style.display = 'none';
                if (video) video.style.display = 'none';
                
                stopWebcam();

                const constraints = {
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve);
                    };
                });

                video.style.display = 'block';
                console.log("Kamera GitHub aktif ✅");

            } catch (err) {
                console.error("Error kamera:", err);
                alert("Gagal akses kamera: " + err.message);
            } finally {
                isStarting = false;
                if (btn) btn.disabled = false;
            }
        }

        function stopWebcam() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            const video = document.getElementById('video');
            if (video) {
                video.srcObject = null;
            }
        }
        
        // Jalankan otomatis saat halaman dibuka
        window.onload = startWebcam;
    </script>
</body>
</html>
