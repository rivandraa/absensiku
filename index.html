/* =========================================================================================================
    BAGIAN KODE TANGGAL
    Fungsi: Menampilkan tanggal dan waktu real-time pada halaman login dan absensi
    Detail:
    - Menampilkan tanggal lengkap dalam bahasa Indonesia (hari, tanggal, bulan, tahun)
    - Menampilkan waktu dengan format 2-digit (jam, menit, detik)
    - Update dilakukan setiap 1 detik agar tampilannya selalu real-time
    - Langsung tampil saat halaman dimuat tanpa menunggu interval pertama
========================================================================================================= */
// ==============================
// Update Tanggal & Waktu Real-Time
// ==============================
function updateTanggalWaktu() {
    const now = new Date(); // Ambil tanggal dan waktu saat ini

    // Format tanggal dalam bahasa Indonesia, lengkap dengan hari, tanggal, bulan, tahun
    const tanggal = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    // Format waktu dalam bahasa Indonesia, format 2-digit untuk jam, menit, dan detik
    const waktu = now.toLocaleTimeString('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });

    // Gabungkan tanggal dan waktu
    const teks = `${tanggal} | ${waktu}`;

    // Tampilkan tanggal dan waktu di elemen login dan absensi
    document.getElementById('tanggalWaktuLogin').textContent = teks;
    document.getElementById('tanggalWaktuAbsen').textContent = teks;
}

// Jalankan fungsi setiap 1 detik untuk update real-time
setInterval(updateTanggalWaktu, 1000);

// Jalankan langsung sekali saat halaman dimuat
updateTanggalWaktu();

/* =========================================================================================================

    Fungsi Utama:
    - Menampilkan notifikasi berupa popup pada halaman (success, error, info, loading)

    Catatan Penting:

    - Mendukung auto-close, manual close, callback, dan mode loading
========================================================================================================= */
// ================================
// Popup Notifikasi
// ================================
/**
 * Menampilkan popup/notifikasi
 * @param {string} msg - Pesan yang ingin ditampilkan
 * @param {string} type - Tipe popup: "success", "error", "info", "loading"
 * @param {number|boolean|null} duration 
 *      - ms → auto-close
 *      - false → jangan auto-close
 *      - null → durasi default 2500 ms
 * @param {function|null} callback - Fungsi yang dijalankan setelah popup tertutup
 */
// ================================
// Popup Notifikasi dan Getar
// ================================
let popupActive = false;

/**
 * Menampilkan popup utama (#popupNotif)
 */
function showPopup(msg, type = "success", duration = null, callback = null) {
    const popup = document.getElementById("popupNotif");

    // Bersihkan timeout lama
    if (popup._timeout) {
        clearTimeout(popup._timeout);
        popup._timeout = null;
    }

    // Reset class
    popup.className = "";
    popup.classList.add(type, "show");
    popup.style.display = "block"; // pakai CSS asli Anda
    popupActive = true;

    // Konten popup
    if (type === "loading") {
        popup.innerHTML = '<div class="spinner"></div><div style="margin-top:8px;">' + msg + '</div>';
        return; // loading tidak auto-close
    } else {
        popup.innerHTML = msg;
    }

    // Jika duration = false → jangan auto-close
    if (duration === false) return;

    // Default duration
    if (duration === null) duration = 5000;

    // Auto-close popup
    popup._timeout = setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => {
            popup.style.display = "none";
            popupActive = false;
            if (callback) callback();
        }, 400); // sesuai transition CSS asli
    }, duration);
}

/**
 * Popup sementara / warning saat loading aktif
 */
function showTempPopup(msg, type = "warning", duration = 1000) {
    const temp = document.createElement("div");
    temp.className = "popup-temp " + type;
    temp.innerHTML = msg;

    document.body.appendChild(temp);

    requestAnimationFrame(() => temp.classList.add("show"));

    setTimeout(() => {
        temp.classList.remove("show");
        setTimeout(() => temp.remove(), 400);
    }, duration);
}

/**
 * Menutup popup utama (#popupNotif) secara paksa
 */
function forceClosePopup() {
    const popup = document.getElementById("popupNotif");

    if (popup._timeout) {
        clearTimeout(popup._timeout);
        popup._timeout = null;
    }

    popup.classList.remove("show");
    setTimeout(() => {
        popup.style.display = "none";
        popupActive = false;
    }, 400);
}

/**
 * Fungsi Getar Pendek (warning / error)
 */
function vibrateAlertShort() { 
    if (navigator.vibrate) {
        navigator.vibrate([80, 50, 80]);  // total ≈ 210ms
    }
}

/**
 * Fungsi Getar Panjang (sukses)
 */
function vibrateAlertLong() { 
    if (navigator.vibrate) {
        navigator.vibrate([300, 100, 300, 100, 300]);  // total ≈ 800ms
    }
}

// ================================
// Hashing Password
// ================================
/**
 * Meng-hash password menggunakan SHA-256 dan mengembalikannya dalam format Base64
 */
async function hashPassword(password) {
    try {
        const msgUint8 = new TextEncoder().encode(password); // Konversi password menjadi Uint8Array
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8); // Hash SHA-256
        const hashArray = Array.from(new Uint8Array(hashBuffer)); // Konversi buffer ke array
        const hashBase64 = btoa(String.fromCharCode.apply(null, hashArray)); // Encode Base64
        return hashBase64;
    } catch (e) {
        console.error("Hashing Error:", e);
        showPopup("⚠️ Gagal memproses password. Cek konsol browser.", "error", 3000);
        return ""; // Mengembalikan string kosong jika gagal
    }
}

/**

async function loginUser() {
    hideAlerts();

    showPopup("Memproses login...", "loading");

    const passwordHash = await hashPassword(password);

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxODNluKur3mEZbcnUDnnnyFVP6_63MN1f5M2CH4XljlFNaJIlivOH2urmY-oypdOU6nQ/exec", {
            method: "POST",
            body: JSON.stringify({
                action: "login",
                username: username,
                passwordHash: passwordHash
            })
        });

        const data = await res.json();

        if (data) {
            // ✅ Login berhasil
            userData = data;

            sessionStorage.setItem('userData', JSON.stringify(data));
            sessionStorage.setItem('page', 'absen');

            $('#LoginPage').hide();
            $('#AbsensiPage').show();

            $('#perangkatDisplay').val(data.nama + ' | ' + data.jabatan);
            $('#perangkatData').val(data.nama + '|' + data.jabatan);

            fotoData = null;

            if (data.koordinat) {
                const parts = data.koordinat.split(",");
                targetLocation = {
                    lat: parseFloat(parts[0]),
                    lon: parseFloat(parts[1])
                };
                lastTargetLocation = targetLocation;
            } else {
                targetLocation = null;
                lastTargetLocation = null;
            }

            console.log("Spreadsheet ID:", data.spreadsheetId);
            console.log("Folder ID:", data.folderId);

            showPopup("Login berhasil! Selamat datang " + data.nama, "success");

            startIdleTimer();

            startWebcam();

        } else {
            $('#alertLogin').html("⚠️ Username atau Password salah!").show();
            showPopup("Username atau password salah!", "error");
        }

    } catch (error) {
        console.error("Error:", error);
        showPopup("⚠️ Gagal terhubung ke server", "error");
        $('#alertLogin').html("⚠️ Gagal terhubung ke server").show();
    }
}

function isWebView() {
    return typeof GPSBridge !== "undefined";
}

// =====================================================
// GET GPS ENABLE STATUS (Universal)
// =====================================================
async function isGPSEnabledUniversal() {
    if (isWebView()) {
        try { return GPSBridge.isGPSEnabled(); } catch { return true; }
    }
    try {
        const perm = await navigator.permissions.query({ name: "geolocation" });
        return perm.state !== "denied";
    } catch { return true; }
}

let gpsWatcherId = null;
let gpsMonitorInterval = null;
let gpsLoadingInterval = null;
let gpsImproveInterval = null;
let accuracyCycleTimer = null;
let gpsData = [0, 0];
let gpsErrorActive = false;
let animatingGPS = false;
let improvingAccuracy = false;
let wasGPSEnabled = null;
let accDots = 0;

// =====================================================

// =====================================================
function startGPS() {
    gpsSystemActive = true;

    refreshTargetLocation(() => {
        if (!gpsSystemActive) return; // Cegah callback jalan setelah logout
        startGPSMonitoring();
    });
}

// =====================================================
// RESET GPS STATE TOTAL
// =====================================================
function resetGPSState() {
    // hentikan interval monitoring
    if (gpsMonitorInterval !== null) {
        clearInterval(gpsMonitorInterval);
        gpsMonitorInterval = null;
    }

    // hentikan watchPosition
    if (gpsWatcherId !== null) {
        navigator.geolocation.clearWatch(gpsWatcherId);
        gpsWatcherId = null;
    }

    // hentikan animasi loading GPS
    if (gpsLoadingInterval !== null) {
        clearInterval(gpsLoadingInterval);
        gpsLoadingInterval = null;
    }

    // hentikan interval improve accuracy
    if (gpsImproveInterval !== null) {
        clearInterval(gpsImproveInterval);
        gpsImproveInterval = null;
    }

    // hentikan timeout accuracy cycle
    if (accuracyCycleTimer !== null) {
        clearTimeout(accuracyCycleTimer);
        accuracyCycleTimer = null;
    }

    // hentikan animasi titik
    if (accAnim !== null) {
        clearInterval(accAnim);
        accAnim = null;
    }
    accDots = 0;

    // reset area status
    areaErrorActive = false;
    lastInsideArea = null;

    // reset state GPS
    gpsData = [0, 0];
    gpsErrorActive = false;
    animatingGPS = false;
    improvingAccuracy = false;
    wasGPSEnabled = null;
    lastGPSEnabled = null;
    targetLocation = null;
    lastTargetLocation = null;

    // reset tampilan
    ["titikKoordinatTampil", "titikKoordinat"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "Sedang mengambil data...";
    });
    updateGPSDisplay("Silakan tunggu...");
}

function startGPSLoading() {

    stopGPSLoading();

    gpsLoadingInterval = setInterval(() => {

// REFRESH TARGET LOCATION (ambil ulang dari spreadsheet)

// =====================================================
// REFRESH TARGET LOCATION (ambil ulang dari spreadsheet)
// =====================================================
function refreshTargetLocation(callback) {
  // Simpan siapa yang sedang login SAAT INI
  const userRequesting = (userData && userData.username) ? userData.username : null;
  
  if (!userRequesting) return;

  // Ambil status saat ini dari dropdown
  const statusInput = document.getElementById("status");
  const currentStatus = statusInput ? statusInput.value : "";
  const tampil = document.getElementById("titikKoordinatTampil");
  const hidden = document.getElementById("titikKoordinat");

  // ✅ CEK STATUS YANG TIDAK BUTUH GPS (Tanpa menunggu server)
  // Menambahkan Izin dan Sakit agar perilaku sama dengan Dinas
  if (currentStatus === "Dinas" || currentStatus === "Izin" || currentStatus === "Sakit") {
    if (tampil) tampil.value = "-";
    if (hidden) hidden.value = "-";
    targetLocation = null;
    lastTargetLocation = null;
    
    if (typeof callback === "function") callback();
    return; 
  }

  // JIKA STATUS HADIR ATAU WFH, barulah kita ambil data dari Google Apps Script
  // ✅ Menambahkan parameter currentStatus agar server tahu koordinat mana yang diambil
  google.script.run.withSuccessHandler(loc => {
    // PROTEKSI: Jika user sudah logout/ganti akun sebelum data sampai
    if (!userData || userData.username !== userRequesting) return;

    // Cek ulang status (takutnya user ganti status saat server sedang loading)
    const statusTerbaru = document.getElementById("status") ? document.getElementById("status").value : "";
    if (statusTerbaru === "Dinas" || statusTerbaru === "Izin" || statusTerbaru === "Sakit") return; 

    if (loc && loc.lat && loc.lon) {
      const newLocation = { lat: loc.lat, lon: loc.lon };

      if (!lastTargetLocation || lastTargetLocation.lat !== newLocation.lat || lastTargetLocation.lon !== newLocation.lon) {
        targetLocation = newLocation;
        lastTargetLocation = newLocation;

        if (gpsData[0] !== 0 && gpsData[1] !== 0) {
          checkUserLocation(gpsData[0], gpsData[1], statusTerbaru);
        }
      }

      const koordinatMurni = `${Number(newLocation.lat).toFixed(6)}, ${Number(newLocation.lon).toFixed(6)}`;

      if (tampil) {
        // Akan menampilkan "Nama Lokasi" atau "Nama Lokasi wf" dari spreadsheet
        tampil.value = (loc.nama && loc.nama.trim() !== "") ? loc.nama : koordinatMurni;
      }
      if (hidden) hidden.value = koordinatMurni;

    } else {
      targetLocation = null;
      lastTargetLocation = null;
      if (tampil) tampil.value = "Titik koordinat tidak ditentukan";
      if (hidden) hidden.value = "";
    }

    if (typeof callback === "function") callback();
  }).getTargetLocation(userRequesting, currentStatus); // ✅ Mengirim 2 parameter: Username dan Status
}

// CEK JARAK KE TITIK TARGET (hanya untuk HADIR)
// =====================================================
const RADIUS_LIMIT = 30; // meter

function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = deg => deg * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

function checkUserLocation(lat, lon, status) {
    if (status !== "Hadir" && status !== "WFH") {
        if (areaErrorActive) {
            forceClosePopup();
            areaErrorActive = false;
        }
        lastInsideArea = null;
        return true;
    }

    if (!targetLocation || !targetLocation.lat || !targetLocation.lon) return true;

    const distance = getDistanceFromLatLonInMeters(lat, lon, targetLocation.lat, targetLocation.lon);
    const insideArea = distance <= RADIUS_LIMIT;

    if (lastInsideArea !== insideArea) {
        if (insideArea) {
            if (areaErrorActive) {
                forceClosePopup();
                areaErrorActive = false;
            }
        } else {
            areaErrorActive = true;
        }
        lastInsideArea = insideArea;
    }
    return insideArea;
}

function startGPSMonitoring() {
    const gpsDiv = document.getElementById("gps");
    if (!gpsDiv) return;

    gpsData = [0, 0];        // koordinat lama dihapus
    lastInsideArea = null;   // hapus status area
    areaErrorActive = false; // hapus error popup lama
    updateGPSDisplay("Sedang mencari lokasi");

    startGPSLoading();
    animatingGPS = true;

    if (!navigator.geolocation) {
        stopGPSLoading();
        updateGPSDisplay("⚠️ GPS tidak tersedia");
        showPopup("⚠️ Perangkat tidak mendukung GPS.", "error", null);
        return;
    }

    if (gpsWatcherId !== null) navigator.geolocation.clearWatch(gpsWatcherId);
    gpsWatcherId = null;

    // =====================================================
    // HANDLE GPS ENABLE / DISABLE
    // =====================================================
    async function handleGPS() {
        const gpsEnabled = await isGPSEnabledUniversal();

        // Tidak berubah → tidak lakukan apa-apa
        if (gpsEnabled === lastGPSEnabled) return;
        lastGPSEnabled = gpsEnabled;

        // -------------------------
        // GPS OFF
        // -------------------------
        if (!gpsEnabled) {
            if (gpsWatcherId !== null) {
                navigator.geolocation.clearWatch(gpsWatcherId);
                gpsWatcherId = null;
            }

            stopGPSLoading();
            if (accAnim) { clearInterval(accAnim); accAnim = null; }

            gpsData = [0, 0];
            animatingGPS = false;
            wasGPSEnabled = false;

            updateGPSDisplay("⚠️ GPS tidak aktif atau sinyal hilang. Periksa GPS.");

            if (!gpsErrorActive) {
                gpsErrorActive = true;
                showPopup("⚠️ GPS tidak aktif atau sinyal hilang. Periksa GPS.", "error", false);
            }
            return;
        }

        // -------------------------
        // GPS ON
        // -------------------------
        if (!wasGPSEnabled) {
            wasGPSEnabled = true;
            gpsErrorActive = false;
            gpsData = [0, 0];

            forceClosePopup();
            startGPSLoading();

            setTimeout(() => {
                startWatch();
            }, 1500);
        }

        if (gpsErrorActive) {
            forceClosePopup();
            gpsErrorActive = false;
        }
    }

    // =====================================================
    // START WATCH
    // =====================================================
    function startWatch() {
        if (!gpsSystemActive) return;
        if (gpsWatcherId !== null) {
            navigator.geolocation.clearWatch(gpsWatcherId);
            gpsWatcherId = null;
        }

        const MAX_ACCURACY = 30;
        const WATCH_OPTIONS = {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 20000
        };

    // Fungsi pembantu sederhana untuk mengambil nama lokasi dari UI
        const getNamaLokasi = () => {
            const el = document.getElementById("titikKoordinatTampil");
            return (el && el.value) ? el.value : "Area Absensi";
        };

        // -------------------------
        // ANIMASI AKURASI
        // -------------------------
        function startAccAnim(lat, lon, acc) {
            stopAccAnim();
            animatingGPS = true;

            accAnim = setInterval(() => {
                accDots = (accDots + 1) % 4;

                const statusInput = document.getElementById("status");
                const status = statusInput ? statusInput.value : "";
                const namaLokasi = getNamaLokasi(); // Ambil nama lokasi dinamis

                let distance = null;
                let insideArea = true;

                if (targetLocation && targetLocation.lat && targetLocation.lon) {
                    distance = getDistanceFromLatLonInMeters(
                        lat, lon,
                        targetLocation.lat, targetLocation.lon
                    );
                    insideArea = distance <= RADIUS_LIMIT;
                }

                // Tampilkan base GPS info (Saat Akurasi Masih Ditingkatkan)
let displayText = "Lokasi Anda : " + lat.toFixed(6) + "," + lon.toFixed(6) + "\n" +
                  "Tingkat Akurasi : " + acc.toFixed(0) + " Meter | > " + MAX_ACCURACY + " Meter\n" +
                  "Sedang meningkatkan akurasi" + ".".repeat(accDots);
            if ((status === "Hadir" || status === "WFH") && targetLocation) {
                displayText += insideArea
                    ? `\n✅ Berada dalam area/radius ${namaLokasi}`
                    : `\n❌ Di luar area dari Titik Koordinat Absensi\n📏 Jarak ${distance.toFixed(0)} Meter (Max. ${RADIUS_LIMIT} Meter)`;
            }

                updateGPSDisplay(displayText);
            }, 500);
        }

        function stopAccAnim() {
            if (accAnim) clearInterval(accAnim);
            accAnim = null;
            accDots = 0;
            animatingGPS = false;
        }

        // =====================================================
        // MAIN watchPosition
        // =====================================================
        gpsWatcherId = navigator.geolocation.watchPosition(
            pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const acc = pos.coords.accuracy;

                const statusInput = document.getElementById("status");
                const status = statusInput ? statusInput.value : "";
                const namaLokasi = getNamaLokasi(); // Ambil nama lokasi dinamis

                let distance = null;
                let insideArea = true;

                if (targetLocation && targetLocation.lat && targetLocation.lon) {
                    distance = getDistanceFromLatLonInMeters(
                        lat, lon,
                        targetLocation.lat, targetLocation.lon
                    );
                    insideArea = distance <= RADIUS_LIMIT;
                }

                stopGPSLoading();

                // Akurasi buruk → jalankan animasi
                if (acc > MAX_ACCURACY) {
                    startAccAnim(lat, lon, acc);
                }
                // Akurasi bagus (Fix) → tampilkan data statis
                else {
                    stopAccAnim();
                    gpsData = [lat, lon];

let displayText = "Lokasi Anda : " + lat.toFixed(6) + "," + lon.toFixed(6) + "\n" +
                  "Tingkat Akurasi : " + acc.toFixed(0) + " Meter | > " + MAX_ACCURACY + " Meter";
            if ((status === "Hadir" || status === "WFH") && targetLocation) {
                displayText += insideArea
                    ? `\n✅ Berada dalam area/radius ${namaLokasi}`
                    : `\n❌ Di luar area dari Titik Koordinat Absensi\n📏 Jarak ${distance.toFixed(0)} Meter (Max. ${RADIUS_LIMIT} Meter)`;
            }

                    updateGPSDisplay(displayText);
                }

                if (gpsErrorActive) {
                    forceClosePopup();
                    gpsErrorActive = false;
                }
            },

            // =====================================================
            // ERROR HANDLER
            // =====================================================
            err => {
                stopAccAnim();
                gpsData = [0, 0];
                animatingGPS = false;
                stopGPSLoading();
                wasGPSEnabled = false;
                gpsErrorActive = true;

                if (gpsWatcherId !== null) {
                    navigator.geolocation.clearWatch(gpsWatcherId);
                    gpsWatcherId = null;
                }

                showPopup("⚠️ GPS tidak aktif atau sinyal hilang. Periksa GPS.", "error", false);
                updateGPSDisplay("GPS tidak aktif atau sinyal hilang. Periksa GPS.");
            },
            WATCH_OPTIONS
        );
    }

    setTimeout(() => handleGPS(), 400);

    if (!gpsMonitorInterval) {
        gpsMonitorInterval = setInterval(() => {
            if (!gpsSystemActive) return; // cek setiap 3 detik
            handleGPS();
            refreshTargetLocation();
        }, 3000);
    }

    if (navigator.permissions) {
        navigator.permissions.query({ name: "geolocation" }).then(permissionStatus => {
            permissionStatus.onchange = () => {
                if (permissionStatus.state === "granted") {
                    startGPSLoading();
                    startWatch();
                    if (gpsErrorActive) {
                        forceClosePopup();
                        gpsErrorActive = false;
                    }
                } else {
                    if (!gpsErrorActive) {
                        gpsErrorActive = true;
                        showPopup("⚠️ GPS tidak aktif. Nyalakan GPS.", "error", false);
                    }
                }
            };
        });
    }
}

// ================================
// Start webcam (versi robust + proteksi klik + error mapping)
// ================================
async function startWebcam() {
  if (isStarting) {
    console.warn("Start kamera sedang diproses, abaikan klik berulang.");
    return;
  }
  isStarting = true;

  const video = document.getElementById('video');
  const preview = document.getElementById('fotoPreview');
  const container = document.getElementById('cameraContainer');
  const btn = document.getElementById('restartCamera');

  if (btn) btn.disabled = true; // disable tombol sementara

  try {
    resetFoto();
    stopWebcam();
    preview.style.display = 'none';
    video.style.display = 'none';

    // Delay kecil untuk WebView / mobile
    await new Promise(resolve => setTimeout(resolve, 500));

    // Cek apakah ada kamera
    const devices = await navigator.mediaDevices.enumerateDevices();
    const hasCamera = devices.some(d => d.kind === 'videoinput');
    if (!hasCamera) {
      showPopup("📷 Tidak ada kamera terdeteksi.", "error");
      vibrateAlertShort();
      return;
    }

    // Ubah bagian getUserMedia menjadi lebih fleksibel
    stream = await navigator.mediaDevices.getUserMedia({
      video: true, // Biarkan browser memilih kamera default dulu jika 'user' gagal
      audio: false
    });

    video.srcObject = stream;

    // Tunggu metadata sebelum play
    await new Promise((resolve, reject) => {
      video.onloadedmetadata = () => {
        video.play().then(resolve).catch(reject);
      };
    });

    video.style.display = 'block';

    // Hitung aspect ratio setelah metadata tersedia
    const aspect = video.videoHeight / video.videoWidth;
    if (aspect && isFinite(aspect)) {
      container.style.height = `${container.offsetWidth * aspect}px`;
    }

    console.log("Kamera aktif ✅");
  } catch (err) {
    console.error("Detail error kamera:", err.name, err.message);

    // Mapping error agar lebih jelas
    let userMessage = "";
    switch (err.name) {
      case "NotFoundError":
        userMessage = "📷 Tidak ada perangkat kamera yang terdeteksi.";
        break;
      case "NotReadableError":
        userMessage = "⚠️ Kamera sedang digunakan aplikasi lain. Tutup aplikasi tersebut lalu coba lagi.";
        break;
      case "OverconstrainedError":
        userMessage = "⚠️ Kamera tidak mendukung konfigurasi yang diminta.";
        break;
      default:
        userMessage = "❌ Terjadi kesalahan: " + err.message;
    }

    showPopup(userMessage, "error");
    vibrateAlertShort();
    stopWebcam();
  } finally {
    isStarting = false;
    if (btn) btn.disabled = false; // aktifkan tombol lagi
  }
}

function formatIndonesia(waktuString) {
  const d = new Date(waktuString);
  if (isNaN(d)) return waktuString;
  const tgl = String(d.getDate()).padStart(2, "0");
  const bln = String(d.getMonth() + 1).padStart(2, "0");
  const thn = d.getFullYear();
  const jam = String(d.getHours()).padStart(2, "0");
  const menit = String(d.getMinutes()).padStart(2, "0");
  const detik = String(d.getSeconds()).padStart(2, "0");
  return `${tgl}-${bln}-${thn} | ${jam}.${menit}.${detik}`;
}

      ctx2.font = "20px Arial";
      allLines.push(gpsText);

      if (ketLines.length > 0) {
        allLines = allLines.concat(ketLines);
      }

      const maxTextWidth = getMaxTextWidth(ctx2, allLines);
      const dynamicWidth = maxTextWidth + paddingBox;
      const finalBoxWidth = Math.min(dynamicWidth, canvas.width);

      // =============================
      // BACKGROUND DINAMIS
      // =============================
      const padding = 15;

      const boxTop = currentY - totalHeight - padding;
      const boxBottom = currentY + padding;
      const boxHeight = totalHeight + padding * 2;

      const gradient = ctx2.createLinearGradient(0, 0, finalBoxWidth, 0);
      gradient.addColorStop(0, "rgba(0,0,0,0.35)");
      gradient.addColorStop(1, "rgba(0,0,0,0)");

      ctx2.fillStyle = gradient;
      ctx2.fillRect(
        0,
        boxTop,
        finalBoxWidth,
        boxHeight
      );

      // =============================
      // GARIS KUNING FIX (TIDAK LEWAT)
      // =============================
      ctx2.shadowColor = "transparent";
      ctx2.strokeStyle = "#FFC107";
      ctx2.lineWidth = 4;
      ctx2.lineCap = "round";

      const halfStroke = ctx2.lineWidth / 2;

      ctx2.beginPath();
      ctx2.moveTo(startX - 12, boxTop + halfStroke);
      ctx2.lineTo(startX - 12, boxBottom - halfStroke);
      ctx2.stroke();

      // =============================
      // GAMBAR DARI BAWAH NAIK
      // =============================

      // 5️⃣ KETERANGAN
      if (ketLines.length > 0) {
        ctx2.font = "20px Arial";
        ctx2.fillStyle = "#FFFFFF";

        for (let i = ketLines.length - 1; i >= 0; i--) {
          ctx2.fillText(ketLines[i], startX, currentY);
          currentY -= lineHeight;
        }
      }

      // 4️⃣ GPS
      ctx2.font = "20px Arial";
      ctx2.fillStyle = "#F8F9FA";
      ctx2.fillText(gpsText, startX, currentY);
      currentY -= lineHeight;

      // 3️⃣ TANGGAL
      ctx2.font = "22px Arial";
      ctx2.fillText(`${tanggalServer} | ${hariServer}`, startX, currentY);
      currentY -= lineHeight;

      // 2️⃣ JAM
      ctx2.font = "bold 23px Arial";
      ctx2.fillStyle = "#FFFFFF";
      ctx2.fillText(jamTampil, startX, currentY);
      currentY -= lineHeight;

      // 1️⃣ STATUS
      if (labelStatus) {
        ctx2.font = "bold 24px Arial";
        ctx2.fillStyle = "#FFC107";
        ctx2.fillText(labelStatus, startX, currentY);
      }

      // Reset shadow
      ctx2.shadowColor = "transparent";
      ctx2.shadowBlur = 0;
      ctx2.shadowOffsetX = 0;
      ctx2.shadowOffsetY = 0;

      // =============================
      // SIMPAN FOTO
      // =============================
      const finalFoto = canvas.toDataURL("image/jpeg", 0.90);

      fotoData = {
        name: `${userData?.nama || "user"}_${waktuFullServer.replace(/[: ]/g, "_")}.jpeg`,
        base64: finalFoto.split(",")[1],
        type: "image/jpeg",
        gps: gpsSaatFoto,
        waktuServerISO: serverTime.iso,
        waktuFotoISO: serverTime.iso
      };

      fotoPreview.src = finalFoto;
      showPopup("Foto berhasil diambil ✅", "success", 1000);
      isSnapping = false;
    };

    img.src = fotoMurni;
  })
  .withFailureHandler(() => {
    showPopup("❌ Gagal mengambil waktu server!", "error");
    isSnapping = false;
  })
  .getServerTime();
});

    // Element input & display
    const inputKoordinat = document.getElementById('titikKoordinatTampil');
    const displayGps = document.getElementById('gps');

    function updateUI() {
        const status = statusSelect.value;

        if (status === "Izin" || status === "Sakit") {
            // Sembunyikan elemen
            koordinatSection.style.display = "none";
            gpsSection.style.display = "none";
            dokumentasiSection.style.display = "none";
            containerTombol.style.setProperty("display", "none", "important");

            // Matikan Kamera
            const video = document.getElementById('video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
        } else if (status === "Hadir" || status === "Dinas" || status === "WFH") {
            // 1. Tampilkan kembali (Gunakan "" agar layout tetap rapi/sejajar kiri)
            koordinatSection.style.display = ""; 
            gpsSection.style.display = "";
            dokumentasiSection.style.display = "";

            if (displayGps) displayGps.innerText = "Sedang mencari lokasi...";
        }
    }

    statusSelect.addEventListener('change', updateUI);

/* =====================================================
    SUBMIT FORM ABSENSI
===================================================== */
/*
    Fungsi submitAbsensiForm:
    - Validasi session login
    - Validasi input status kehadiran
    - Validasi foto untuk status Hadir/Dinas
    - Validasi GPS sudah aktif
    - Mengirim data absensi ke Google Apps Script
    - Menampilkan popup notifikasi berdasarkan hasil response
*/
// ================================
// Submit Absensi
// ================================
/**
 * Submit form absensi
 */
// ================================
// Submit Absensi
// ================================
let isSubmitting = false;

function submitAbsensiForm() {
    hideAlerts();

    // 🚫 Cegah double submit
    if (isSubmitting) {
        showTempPopup("⏳ Absensi sedang diproses, harap tunggu...");
        vibrateAlertShort();  // 🔥 getaran
        return;
    }
    isSubmitting = true;

    const perangkatVal = $('#perangkatData').val().trim();
    const val = perangkatVal ? perangkatVal.split('|') : [];

    if (!userData || val.length < 2 || !val[0] || !val[1]) {
        popupActive = false; 
        showPopup("Sesi login berakhir. Silakan login ulang.", "error");
        isSubmitting = false;
        return;
    }

    // ======================================
    // Ambil Data
    // ======================================
    const statusRaw = $('#status').val().trim();          // nilai asli, Huruf besar di depan
    const status = statusRaw.toLowerCase();              // untuk validasi, lowercase
    const keterangan = $('#keterangan').val().trim();

    // ======================================
    // VALIDASI STATUS WAJIB DIPILIH
    // ======================================
    if (!statusRaw) {
        showPopup("Silakan pilih status terlebih dahulu!", "warning");
        vibrateAlertShort();

        const statusField = document.getElementById('status');
        statusField.focus();
        statusField.scrollIntoView({ behavior: "smooth", block: "center" });

        isSubmitting = false;
        return;
    }

    // ======================================
    // VALIDASI KETERANGAN WAJIB
    // Berlaku untuk IJIN & DINAS
    // ======================================
    // VALIDASI KETERANGAN WAJIB
    const ketWajib = (status === "izin" || status === "sakit" || status === "dinas");

    if (ketWajib && !keterangan) {
        showPopup("Keterangan wajib diisi untuk status " + statusRaw + "!", "warning");
        vibrateAlertShort();  // 🔥 getaran
        // 🔥 Autofokus + Scroll ke field keterangan
        const ketField = document.getElementById('keterangan');
        ketField.focus();
        ketField.scrollIntoView({ behavior: "smooth", block: "center" });

        isSubmitting = false;
        return;
    }

    // ======================================
    // VALIDASI FOTO WAJIB
    // Kecuali: IJIN & SAKIT
    // ======================================
    // Ambil foto
    const wajibFoto = (status === "hadir" || status === "dinas");

    if (wajibFoto && !fotoData) {
        showPopup("Foto Kehadiran wajib untuk status " + statusRaw + "!", "warning");
        vibrateAlertShort();  // 🔥 getaran
        isSubmitting = false;
        return;
    }

    // ======================================
    // VALIDASI GPS
    // Kecuali: IJIN & SAKIT
    // ======================================
    const gpsWajib = !(status === "izin" || status === "sakit");

    if (gpsWajib) {
        if ((gpsData[0] === 0 && gpsData[1] === 0) || animatingGPS || improvingAccuracy) {
            showPopup("GPS belum aktif. Izinkan akses lokasi.", "error");
            vibrateAlertShort();  // 🔥 getaran
            isSubmitting = false;
            return;
        }
    }

    // ======================================
    // VALIDASI RADIUS KHUSUS HADIR
    // ======================================
    if (status === "hadir") {
        const [lat, lon] = gpsData;
        const insideArea = checkUserLocation(lat, lon, status);
        if (!insideArea) {
            showPopup("⚠️ Anda berada di luar area, silakan pindah ke area yang ditentukan!", "error", false);
            vibrateAlertShort();  // 🔥 getaran
            isSubmitting = false;
            return;
        }
    }

    // ======================================
    // DATA DIKIRIM KE APPS SCRIPT
    // ======================================
    // Default data
    const data = {
        nama: val[0],
        jabatan: val[1],
        status: statusRaw,
        keterangan: keterangan,
        statusPegawai: userData.statusPegawai,
        spreadsheetId: userData.spreadsheetId,
        folderId: userData.folderId
    };

    // Tambahkan foto & GPS hanya jika bukan Izin/Sakit
    if (!(status === "izin" || status === "sakit")) {
        data.foto = fotoData;
        data.gps = gpsSaatFoto;
    }

    // Kunci tombol Snap & Reset
    document.getElementById('snap').disabled = true;
    document.getElementById('reset').disabled = true;
    
    showPopup("Memproses absensi...", "loading");

    google.script.run
        .withSuccessHandler(res => {
            // 🔓 Buka kembali tombol setelah submit selesai
            document.getElementById('snap').disabled = false;
            document.getElementById('reset').disabled = false;
            isSubmitting = false;

            if (res) {
                if (res.status === "berhasil") {
                    const waktuID = formatIndonesia(res.waktu);
                    showPopup(
                        `✅ Absensi berhasil!<br>Nama: <b>${res.nama}</b><br>Waktu Absen: <b>${waktuID}</b>`,
                        "success", 6000);
                    vibrateAlertLong();  // 🔥 getaran
                    $('#status').val('');
                    $('#keterangan').val('');
                    fotoData = null;
                    $('#perangkatDisplay').val(userData.nama + ' | ' + userData.jabatan);
                    resetFoto();

                } else if (res.status === "sudah_absen") {
                    const waktuID = formatIndonesia(res.waktu);
                    showPopup(
                        `⚠️ Anda sudah absen hari ini!<br>Waktu Absen: <b>${waktuID}</b>`,
                        "warning", 6000);
                    vibrateAlertLong();  // 🔥 getaran
                } else {
                    showPopup("⚠️ Terjadi kesalahan saat menyimpan absensi.", "error");
                    vibrateAlertShort();  // 🔥 getaran
                }
            } else {
                showPopup("⚠️ Terjadi kesalahan tak terduga.", "error");
                vibrateAlertShort();  // 🔥 getaran
            }
        })
        .withFailureHandler(err => {
            // 🔓 Buka kembali tombol setelah submit selesai
            document.getElementById('snap').disabled = false;
            document.getElementById('reset').disabled = false;
            isSubmitting = false;
            showPopup("⚠️ Gagal mengirim absensi: " + err.message, "error");
            vibrateAlertLong();  // 🔥 getaran
        })
        .submitAbsensi(data);
}

let isshowLaporan = false;

        return;

    isshowLaporan = true;

    resetFoto();

    google.script.run.withSuccessHandler(function(html) {

        loadLaporan_Absensi($("#InnerPage").find("#filterStatus").val());

        tbody.html('<tr><td colspan="8">Spreadsheet ID kosong / user belum login.</td></tr>');

          theadHtml += `<th>${h}</th>`;

            <td>${r.hadir}</td>

            <td>${r.sakit}</td>

/**
 * Submit Form Ubah Password
 */
async function submitPengaturanPassword() {
    $('#Pengaturan_PasswordAlert').hide();

    const oldPass = $('#oldPassword').val();
    const newPass = $('#newPassword').val();
    const confirmPass = $('#confirmNewPassword').val();
    const username = $('#Pengaturan_PasswordUsername').val();

    // Validasi password
    if (newPass.length < 6) { 
        $('#Pengaturan_PasswordAlert').html("Password baru minimal 6 karakter.").show();
        return;
    }
    if (newPass !== confirmPass) {
        $('#Pengaturan_PasswordAlert').html("Password baru dan konfirmasi tidak cocok.").show();
        return;
    }
    if (oldPass === newPass) {
        $('#Pengaturan_PasswordAlert').html("Password baru tidak boleh sama dengan password lama.").show();
        return;
    }

    // Hash password lama & baru
    const oldPassHash = await hashPassword(oldPass); 
    const newPassHash = await hashPassword(newPass); 

    const data = {
        username: username,
        oldPassword: oldPassHash,
        newPassword: newPassHash
    };

    showPopup("Memverifikasi dan mengubah password...", "loading");

    // Kirim ke server / Apps Script
    google.script.run.withSuccessHandler(res => {
        // Reset input form
        $('#oldPassword, #newPassword, #confirmNewPassword').val('');

        if (res.status === "berhasil") {
            showPopup("✅ Password berhasil diubah!", "success", null);
        } else if (res.status === "salah_lama") {
            showPopup("⚠️ Password lama salah!", "error");
            $('#Pengaturan_PasswordAlert').html("Password lama yang Anda masukkan salah.").show();
        } else {
            showPopup("⚠️ Gagal mengubah password. Hubungi Admin.", "error");
        }
    }).updatePassword(data);
}

        fotoData = null; 
        //startGPS();
        resetFoto();
        //startWebcam();
    }
}

/* =========================================================================================================
    INIT HALAMAN (Inisialisasi Saat Halaman Dimuat)
    Fungsi: Mengecek session, menampilkan halaman sesuai state, memulai GPS, webcam, dan idle timer
========================================================================================================= */
/* =====================================================
    Inisialisasi Halaman Saat Dokumen Siap
===================================================== */
/*
    $(document).ready(function() { ... })
    - Fungsi dijalankan saat DOM siap
    - Mengecek apakah ada session user yang tersimpan
    - Menentukan halaman mana yang ditampilkan:
        1. Laporan_Absensi
        2. Pengaturan_Password
        3. Default: Halaman Absensi
    - Menyertakan restart GPS, webcam, dan idle timer
    - Jika tidak ada session → tampilkan halaman login
*/
/* ===================================================
    INIT (Inisialisasi Saat Halaman Dimuat)
=================================================== */
$(document).ready(function() {
    const savedUser = sessionStorage.getItem('userData');
    const page = sessionStorage.getItem('page');

    if (savedUser) {
        userData = JSON.parse(savedUser);

        // ========= // Cek Halaman Laporan_Absensi ==========
        if (page === 'Laporan_Absensi') {
            $('#LoginPage').hide();
            $('#AbsensiPage').hide();
            showLaporan_Absensi(); // Fungsi ini sudah menghentikan resource (jika ada)
            return;
        } 

        // ========= // Cek Halaman Ubah Password ==========
        else if (page === 'Pengaturan_Password') {
            $('#LoginPage').hide();
            $('#AbsensiPage').hide();
            openPengaturanPasswordForm(); // Fungsi ini sudah menghentikan resource (jika ada)
            return;
        } 

        // ========= // Default Halaman Absensi ==========
        $('#LoginPage').hide(); 
        $('#AbsensiPage').show();
        $('#InnerPage').hide();

        $('#perangkatDisplay').val(userData.nama + ' | ' + userData.jabatan);
        $('#perangkatData').val(userData.nama + '|' + userData.jabatan);

        fotoData = null; // Selalu reset foto saat refresh halaman absensi
        startGPS();
        startWebcam(); 
        startIdleTimer();

    } else { 
        // ========= // Tidak Ada Sesi Tersimpan ==========
        $('#LoginPage').show(); 
        $('#AbsensiPage').hide(); 
        $('#InnerPage').hide(); 
        hideAlerts();
    }
});

/* =====================================================
    Fungsi lainnya
===================================================== */
// Fungsi autoresize
function autoResize(el) { 
    el.style.height = 'auto'; 
    el.style.height = el.scrollHeight + 'px'; 
}

function autoFitText(selector, maxSize = 22, minSize = 10) {
    const elements = document.querySelectorAll(selector);

    elements.forEach(el => {
        let size = maxSize;
        el.style.fontSize = size + "px";

        while (el.scrollWidth > el.clientWidth && size > minSize) {
            size--;
            el.style.fontSize = size + "px";
        }
    });
}

function runAutoFit() {
    autoFitText(".title", 22, 12);
    autoFitText(".subtitle", 18, 10);
}

window.addEventListener("load", runAutoFit);
window.addEventListener("resize", runAutoFit);
